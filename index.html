<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #2C1600;
    }

    nav {
      position: fixed;
      top: 0; left: 0;
      padding: 28px 40px;
    }

    nav img {
      height: 44px;
      display: block;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .center a {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 4px;
      transition: color 0.3s, border-color 0.3s;
    }

    .center a:hover {
      color: #D4956A;
      border-color: #D4956A;
    }
  </style>
</head>
<body>

  <nav>
    <img src="logo.png" alt="12astra" />
  </nav>

  <div class="center">
    <a href="information.html">Information</a>
    <a href="register.html">Register Interest</a>
  </div>

</body>
</html>
