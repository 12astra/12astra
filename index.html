<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #2C1600;
      overflow: hidden;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 40px;
    }
    nav img {
      height: 120px;
      display: block;
      mix-blend-mode: multiply;
    }
    .nav-lines {
      position: relative;
      height: 20px;
      margin-top: -14px;
    }
    .line-1 {
      position: absolute;
      height: 1px;
      background: #B5713A;
      left: 40px;
      right: 0px;
      top: 14px;
    }
    .line-2 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 11%;
      right: 0px;
      top: 7px;
    }
    .line-3 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 15%;
      right: 0px;
      top: 0px;
    }
