<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #2C1600;
      overflow: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 40px;
    }
    nav img {
      height: 120px;
      display: block;
      mix-blend-mode: multiply;
    }

    /* ── HORIZONTAL LINES UNDER LOGO ──
       left = where line starts from left edge
       right = where line ends (0 = full width to right edge)
       top = vertical position (lower number = higher up)
       height = thickness
    */
    .nav-lines {
      position: relative;
      height: 20px;       /* container height */
      margin-top: -14px;  /* pulls lines closer to logo */
    }

    /* Bottom line — longest, sits directly under logo */
    .line-1 {
      position: absolute;
      height: 1px;
      background: #B5713A;
      left: 40px;
      right: 0px;
      top: 14px;
    }

    /* Middle line — starts after the "a" in astra */
    .line-2 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 11%;
      right: 0px;
      top: 7px;
    }

    /* Top line */
    .line-3 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 15%;
      right: 0px;
      top: 0px;
    }

    /* ── CURVED LINES ON LEFT ──
       The SVG sits on the left side of the page.
       width = how wide the container is (controls how far right lines reach)
       Each path:
         M x y = starting point (x = horizontal pos, y = where line starts vertically)
         L x y = straight line down to here (y = where curve begins)
         Q cx cy x y = curve control point and end point
           cx cy = pull point for curve shape
           x y = where line exits (negative x = exits off left edge)
       stroke-width = thickness
       opacity = visibility (0-1)
    */
    .curved-lines {
      position: fixed;
      left: 0;
      top: 0;
      width: 40px;        /* width of SVG container */
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;          /* space between About and Register Interest */
      position: relative;
      z-index: 10;
    }

    .about-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .about-link:hover { color: #D4956A; border-color: #D4956A; }

    .register-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1.3rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .register-link:hover { color: #D4956A; border-color: #D4956A; }

    @media (max-width: 768px) {
      nav img { height: 60px; }
      .nav-top { padding: 0 20px; align-items: center; }
      .register-link { font-size: 1rem; }
      .about-link { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-top">
      <img src="darklogo.png" alt="12astra" />
    </div>
    <div class="nav-lines">
      <div class="line-3"></div>
      <div class="line-2"></div>
      <div class="line-1"></div>
    </div>
  </nav>

  <!--
    CURVED LINES
    M x y  = where line starts (x = how far right, y = how far down)
    L x y  = draws straight down to here (increase y to start curve lower)
    Q cx cy x y = curve:
      cx = horizontal pull (same as line x keeps it tight)
      cy = vertical pull (between L y and end y)
      x y = exit point (negative x exits off left edge)
    stroke-width = thickness
    opacity = visibility
  -->
  <svg class="curved-lines" viewBox="0 0 40 500" xmlns="http://www.w3.org/2000/svg" fill="none">

    <!-- Outer line (leftmost) -->
    <path
      d="M 6 170 L 6 440 Q 6 452 -30 452"
      stroke="#B5713A"
      stroke-width="1"
      opacity="0.5"
    />

    <!-- Middle line -->
    <path
      d="M 10 170 L 10 444 Q 10 456 -30 456"
      stroke="#B5713A"
      stroke-width="1.5"
      opacity="0.65"
    />

    <!-- Inner line (rightmost, most visible) -->
    <path
      d="M 14 170 L 14 448 Q 14 460 -30 460"
      stroke="#B5713A"
      stroke-width="2"
      opacity="0.85"
    />

  </svg>

  <div class="center">
    <a class="about-link" href="about.html">About</a>
    <a class="register-link" href="register.html">Register Interest</a>
  </div>

</body>
</html>
