<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #2C1600;
      overflow: hidden;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 3vw;
    }
    nav img {
      height: 10vw;
      max-height: 120px;
      min-height: 50px;
      display: block;
      mix-blend-mode: multiply;
    }
    .nav-lines {
      position: relative;
      height: 20px;
      margin-top: -14px;
    }
    .line-1 {
      position: absolute;
      height: 1px;
      background: #B5713A;
      left: 3vw;
      right: 0px;
      top: 14px;
    }
    .line-2 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 11vw;
      right: 0px;
      top: 7px;
    }
    .line-3 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 13vw;
      right: 0px;
      top: 0px;
    }
    .curved-lines {
      position: fixed;
      left: 0;
      top: 0;
      width: 8vw;
      max-width: 80px;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      z-index: 10;
    }
    .about-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .about-link:hover { color: #D4956A; border-color: #D4956A; }
    .register-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1.3rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .register-link:hover { color: #D4956A; border-color: #D4956A; }

    @media (max-width: 768px) {
      .line-1 { left: 22vw; }
      .line-2 { left: 32vw; }
      .line-3 { left: 38vw; }
      .register-link { font-size: 1rem; }
      .about-link { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-top">
      <img src="darklogo.png" alt="12astra" />
    </div>
    <div class="nav-lines">
      <div class="line-3"></div>
      <div class="line-2"></div>
      <div class="line-1"></div>
    </div>
  </nav>

  <svg class="curved-lines" viewBox="0 0 80 700" xmlns="http://www.w3.org/2000/svg" fill="none">
    <path d="M 20 140 L 20 590 Q -10 610 -10 620" stroke="#B5713A" stroke-width="1.5" opacity="0.5"/>
    <path d="M 34 70 L 34 605 Q -10 625 -10 635" stroke="#B5713A" stroke-width="2" opacity="0.65"/>
    <path d="M 48 110 L 48 620 Q -10 640 -10 650" stroke="#B5713A" stroke-width="2.5" opacity="0.85"/>
  </svg>

  <div class="center">
    <a class="about-link" href="about.html">About</a>
    <a class="register-link" href="register.html">Register Interest</a>
  </div>
</body>
</html>
