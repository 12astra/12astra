<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #2C1600;
      overflow: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 40px;
    }
    nav img {
      height: 120px;
      display: block;
      mix-blend-mode: multiply;
    }

    /* ── HORIZONTAL LINES UNDER LOGO ──
       Each line is positioned absolutely.
       left = where it starts from the left edge of the page
       right = where it ends (0 = goes to right edge)
       top = vertical position within .nav-lines container
       height = thickness of the line
    */
    .nav-lines {
      position: relative;
      height: 20px;       /* container height — increase if lines get cut off */
      margin-top: -14px;  /* how close lines sit to the logo — negative pulls them up */
    }

    /* Bottom line — longest, sits directly under logo */
    .line-1 {
      position: absolute;
      height: 1px;        /* thickness */
      background: #B5713A;
      left: 40px;         /* starts at left edge of logo */
      right: 0px;         /* goes to right edge of page */
      top: 14px;          /* vertical position — higher number = lower */
    }

    /* Middle line — starts after the "a" in astra */
    .line-2 {
      position: absolute;
      height: 2px;        /* thickness */
      background: #B5713A;
      left: 11%;          /* starts 11% from left — increase to push right */
      right: 0px;         /* goes to right edge */
      top: 7px;           /* vertical position */
    }

    /* Top line — sits above middle line */
    .line-3 {
      position: absolute;
      height: 2px;        /* thickness */
      background: #B5713A;
      left: 15%;          /* starts 15% from left — increase to push right */
      right: 0px;         /* goes to right edge */
      top: 0px;           /* vertical position — 0 = highest */
    }

    /* ── CURVED VERTICAL LINES ON LEFT ──
       This is an SVG positioned on the left side of the page.
       width = how wide the SVG container is
       The viewBox controls the internal coordinate system.
       Each path uses:
         M x y = starting point (x = horizontal, y = vertical from top)
         L x y = straight line to this point
         Q cx cy x y = curve — cx/cy is the control point, x/y is end point
       stroke-width = line thickness
       opacity = how visible the line is (0 = invisible, 1 = full)
    */
    .curved-lines {
      position: fixed;
      left: 0;
      top: 0;
      width: 60px;        /* width of SVG container — increase to move lines right */
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;          /* space between About and Register Interest */
      position: relative;
      z-index: 10;
    }

    .about-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;         /* size of About text */
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .about-link:hover { color: #D4956A; border-color: #D4956A; }

    .register-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1.3rem;          /* size of Register Interest text */
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .register-link:hover { color: #D4956A; border-color: #D4956A; }

    @media (max-width: 768px) {
      nav img { height: 60px; }
      .nav-top { padding: 0 20px; align-items: center; }
      .register-link { font-size: 1rem; }
      .about-link { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-top">
      <img src="darklogo.png" alt="12astra" />
    </div>
    <div class="nav-lines">
      <div class="line-3"></div>
      <div class="line-2"></div>
      <div class="line-1"></div>
    </div>
  </nav>

  <!--
    CURVED LINES SVG
    viewBox="0 0 60 500" means the internal canvas is 60 wide and 500 tall.
    Each path:
      M x y  = where the line starts (top of line)
      L x y  = draws straight down to this point
      Q cx cy x y = curve:
        cx cy = control point (pulls the curve — lower cx = more curve to left)
        x y   = where the line ends (off left edge of page = negative x)

    To adjust:
      - Move line left/right: change the M and L x values
      - Change where line starts vertically: change M y value
      - Change where curve begins: change L y value
      - Change curve shape: adjust Q cx cy values
      - Change line thickness: stroke-width
      - Change opacity: opacity
  -->
  <svg class="curved-lines" viewBox="0 0 60 500" xmlns="http://www.w3.org/2000/svg" fill="none">

    <!-- Outer line (leftmost) -->
    <path
      d="M 10 170 L 10 390 Q 10 430 -30 430"
      stroke="#B5713A"
      stroke-width="1"       /* thickness */
      opacity="0.5"          /* visibility */
    />

    <!-- Middle line -->
    <path
      d="M 20 170 L 20 410 Q 20 450 -30 450"
      stroke="#B5713A"
      stroke-width="1.5"     /* thickness */
      opacity="0.65"         /* visibility */
    />

    <!-- Inner line (rightmost, most visible) -->
    <path
      d="M 30 170 L 30 430 Q 30 470 -30 470"
      stroke="#B5713A"
      stroke-width="2"       /* thickness */
      opacity="0.85"         /* visibility */
    />

  </svg>

  <div class="center">
    <a class="about-link" href="about.html">About</a>
    <a class="register-link" href="register.html">Register Interest</a>
  </div>

</body>
</html>
