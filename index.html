<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1C0E00;
      overflow: hidden;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 3vw;
    }
    .nav-left {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .nav-left a { display: block; line-height: 0; }
    nav img {
      height: 7vw;
      max-height: 90px;
      min-height: 28px;
      width: auto;
      max-width: 200px;
      display: block;
    }
    .nav-lines-svg {
      display: block;
      width: 100%;
      overflow: visible;
      margin-top: 0;
    }
    .nav-left {
      overflow: visible;
    }
    .curved-lines {
      position: fixed;
      left: 0;
      top: 0;
      width: 8vw;
      max-width: 80px;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      z-index: 10;
    }
    .about-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .about-link:hover { color: #D4956A; border-color: #D4956A; }
    .register-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1.3rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .register-link:hover { color: #D4956A; border-color: #D4956A; }
    @media (max-width: 768px) {
      nav img { height: 28px; width: auto; max-width: 120px; min-height: unset; }
      .line-2 { left: 38vw; }
      .line-3 { left: 44vw; }
      .register-link { font-size: 1rem; }
      .about-link { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-top">
      <div class="nav-left">
        <a href="index.html"><img src="logoletter.png" alt="12astra" /></a>
        <svg class="nav-lines-svg" viewBox="0 -15 1000 20" width="100%" height="20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M 130 -12 L 985 -12 C 989 -12 992 -15 992 -19 L 992 -60" stroke="#B5713A" stroke-width="1" opacity="0.5" vector-effect="non-scaling-stroke"/>
          <path d="M 100 -5 L 985 -5 C 993 -5 999 -11 999 -19 L 999 -60" stroke="#B5713A" stroke-width="2" opacity="0.65" vector-effect="non-scaling-stroke"/>
          <path d="M 0 2 L 985 2 C 997 2 1006 -7 1006 -19 L 1006 -60" stroke="#B5713A" stroke-width="2" opacity="0.85" vector-effect="non-scaling-stroke"/>
        </svg>
      </div>
    </div>
  </nav>

  <svg class="curved-lines" viewBox="0 0 80 700" xmlns="http://www.w3.org/2000/svg" fill="none">
    <path d="M 20 140 L 20 607 C 20 611 16 615 12 615 L -30 615" stroke="#B5713A" stroke-width="1.5" opacity="0.5"/>
    <path d="M 34 70 L 34 607 C 34 619 24 629 12 629 L -30 629" stroke="#B5713A" stroke-width="2" opacity="0.65"/>
    <path d="M 48 110 L 48 607 C 48 627 32 643 12 643 L -30 643" stroke="#B5713A" stroke-width="2.5" opacity="0.85"/>
  </svg>

  <div class="center">
    <a class="about-link" href="about.html">About</a>
    <a class="register-link" href="register.html">Register Interest</a>
  </div>
</body>
</html>
