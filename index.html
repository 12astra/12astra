<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #2C1600;
      overflow: hidden;
    }

    .top-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #B5713A;
      z-index: 200;
    }

    nav {
      position: fixed;
      top: 3px; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 40px;
    }
    nav img {
      height: 120px;
      display: block;
      mix-blend-mode: multiply;
    }
    .nav-line {
      height: 3px;
      background: #B5713A;
      margin-left: 40px;
      margin-top: 6px;
    }

    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      z-index: 10;
    }
    .about-link {
      color: rgba(181,113,58,0.6);
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .about-link:hover { color: #B5713A; }
    .register-link {
      color: #B5713A;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 1.3rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      padding-bottom: 5px;
      transition: color 0.3s, border-color 0.3s;
    }
    .register-link:hover {
      color: #D4956A;
      border-color: #D4956A;
    }

    .arcs {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 300px;
      height: 300px;
      z-index: 1;
    }

    @media (max-width: 768px) {
      nav img { height: 60px; }
      .nav-top { padding: 0 20px; align-items: center; }
      .nav-line { margin-left: 20px; }
      .register-link { font-size: 1rem; }
      .arcs { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>

  <div class="top-line"></div>

  <nav>
    <div class="nav-top">
      <img src="darklogo.png" alt="12astra" />
    </div>
    <div class="nav-line"></div>
  </nav>

  <!-- Concentric arcs bottom left -->
  <svg class="arcs" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none">
    <path d="M 0 280 Q 0 20 280 20" stroke="#B5713A" stroke-width="1.5" opacity="0.5"/>
    <path d="M 0 260 Q 0 40 260 40" stroke="#B5713A" stroke-width="1" opacity="0.4"/>
    <path d="M 0 240 Q 0 60 240 60" stroke="#B5713A" stroke-width="1" opacity="0.3"/>
  </svg>

  <div class="center">
    <a class="about-link" href="about.html">About</a>
    <a class="register-link" href="register.html">Register Interest</a>
  </div>

</body>
</html>
