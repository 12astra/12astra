<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12astra — Register Interest</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #1C0E00;
      color: #B5713A;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 0 0;
      z-index: 100;
      background: #1C0E00;
    }
    .nav-top {
      display: flex;
      align-items: flex-end;
      padding: 0 3vw;
      position: relative;
    }
    .nav-left {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .nav-left a { display: block; line-height: 0; }
    nav img {
      height: 7vw;
      max-height: 90px;
      min-height: 28px;
      width: auto;
      max-width: 200px;
      display: block;
    }
    .nav-info {
      position: absolute;
      right: 3vw;
      bottom: 8px;
      z-index: 200;
      background: #1C0E00;
      padding: 0 0 0 12px;
    }
    .nav-lines {
      position: relative;
      height: 20px;
      margin-top: 0px;
      z-index: 0;
    }
    .line-1 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 0px;
      right: 0px;
      top: 2px;
    }
    .line-2 {
      position: absolute;
      height: 2px;
      background: #B5713A;
      left: 10vw;
      right: 0px;
      top: -5px;
    }
    .line-3 {
      position: absolute;
      height: 1px;
      background: #B5713A;
      left: 13vw;
      right: 0px;
      top: -12px;
    }
    .nav-info a {
      color: #B5713A;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-info a:hover { color: #D4956A; }
    .curved-lines {
      position: fixed;
      left: 0;
      top: 0;
      width: 8vw;
      max-width: 80px;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }
    .page { max-width: 640px; margin: 0 auto; padding: 220px 40px 80px; position: relative; z-index: 10; }
    h1 {
      font-size: 1.6rem;
      font-weight: 200;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 48px;
      border-bottom: 1px solid rgba(181,113,58,0.3);
      padding-bottom: 20px;
    }
    .field { margin-bottom: 32px; }
    label {
      display: block;
      font-size: 0.76rem;
      font-weight: 200;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #B5713A;
    }
    label span {
      color: rgba(181,113,58,0.5);
      font-size: 0.65rem;
      margin-left: 6px;
      text-transform: none;
      letter-spacing: 0;
    }
    input[type="text"],
    input[type="email"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(181,113,58,0.4);
      color: #D4956A;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) saturate(2) hue-rotate(345deg);
    }
    select { appearance: none; cursor: pointer; }
    select option { background: #1C0E00; color: #D4956A; }
    input:focus, textarea:focus, select:focus { border-bottom-color: #B5713A; }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .radio-group { display: flex; flex-direction: column; gap: 12px; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: none;
      cursor: pointer;
      margin-bottom: 0;
    }
    input[type="radio"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid #B5713A;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }
    input[type="radio"]:checked::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #B5713A;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .hint {
      font-size: 0.72rem;
      color: rgba(181,113,58,0.6);
      line-height: 1.7;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 24px;
    }
    input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid #B5713A;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      position: relative;
    }
    input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -2px; left: 1px;
      font-size: 11px;
      color: #B5713A;
    }
    .checkbox-row label {
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: none;
      line-height: 1.6;
      cursor: pointer;
      margin-bottom: 0;
    }
    .checkbox-row label a {
      color: #B5713A;
      text-decoration: none;
      border-bottom: 1px solid rgba(181,113,58,0.4);
    }
    .checkbox-row label a:hover { color: #D4956A; }
    .disclaimer {
      font-size: 0.68rem;
      color: rgba(181,113,58,0.5);
      letter-spacing: 0.08em;
      line-height: 1.8;
      margin-top: 24px;
    }
    button {
      margin-top: 40px;
      background: transparent;
      border: 1px solid #B5713A;
      color: #B5713A;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 14px 48px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    button:hover { background: #B5713A; color: #1C0E00; }
    .success {
      display: none;
      text-align: center;
      padding: 60px 0;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      line-height: 2;
      text-transform: uppercase;
    }
    @media (max-width: 768px) {
      nav img { height: 28px; width: auto; max-width: 120px; min-height: unset; }
      .line-2 { left: 38vw; }
      .line-3 { left: 44vw; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-top">
      <div class="nav-left">
        <a href="index.html"><img src="logoletter.png" alt="12astra" /></a>
        <div class="nav-lines">
          <div class="line-3"></div>
          <div class="line-2"></div>
          <div class="line-1"></div>
        </div>
      </div>
      <div class="nav-info">
        <a href="about.html">About</a>
      </div>
    </div>
  </nav>

  <svg class="curved-lines" viewBox="0 0 80 700" xmlns="http://www.w3.org/2000/svg" fill="none">
    <path d="M 20 140 L 20 607 C 20 611 16 615 12 615 L -30 615" stroke="#B5713A" stroke-width="1.5" opacity="0.5"/>
    <path d="M 34 70 L 34 607 C 34 619 24 629 12 629 L -30 629" stroke="#B5713A" stroke-width="2" opacity="0.65"/>
    <path d="M 48 110 L 48 607 C 48 627 32 643 12 643 L -30 643" stroke="#B5713A" stroke-width="2.5" opacity="0.85"/>
  </svg>

  <div class="page">
    <h1>Register Interest</h1>

    <form id="form">
      <div class="field">
        <label>First Name <span>*</span></label>
        <input type="text" name="firstName" required />
      </div>
      <div class="field">
        <label>Last Name <span>*</span></label>
        <input type="text" name="lastName" required />
      </div>
      <div class="field">
        <label>Email Address <span>*</span></label>
        <input type="email" name="email" required />
      </div>
      <div class="field">
        <label>Date of Birth <span>*</span></label>
        <input type="date" name="dateOfBirth" required />
      </div>
      <div class="field">
        <label>Occupation <span>*</span></label>
        <input type="text" name="occupation" required />
      </div>
      <div class="field">
        <label>Based in London? <span>*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="basedInLondon" value="Yes" required /> Yes</label>
          <label><input type="radio" name="basedInLondon" value="No" /> No</label>
        </div>
      </div>
      <div class="field">
        <label>Instagram <span>Optional</span></label>
        <input type="text" name="instagram" />
      </div>
      <div class="field">
        <label>Sexuality <span>Optional</span></label>
        <select name="sexuality">
          <option value="" disabled selected></option>
          <option value="Gay">Gay</option>
          <option value="Bisexual">Bisexual</option>
          <option value="Other">Other</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
      </div>
      <div class="field">
        <label>Interests <span>*</span></label>
        <p class="hint">No right or wrong answers — this helps us connect you with people who share similar interests.</p>
        <textarea name="interests" required></textarea>
      </div>
      <div class="field">
        <label>How did you hear about 12Astra? <span>*</span></label>
        <input type="text" name="howDidYouHear" required />
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="consent" name="consent" required />
        <label for="consent">I agree that 12Astra may store and use the information I provide for the purposes of administering my registration of interest, communicating with me about membership opportunities, events and club updates, and managing my relationship with the club.</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="privacy" name="privacy" required />
        <label for="privacy">I have read and understood the <a href="privacy.html">Privacy Policy</a>.</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="marketing" name="marketing" />
        <label for="marketing">I would like to receive marketing communications, news and updates from 12Astra.</label>
      </div>
      <p class="disclaimer">Registering interest does not guarantee membership. Membership is subject to application and approval.</p>
      <button type="submit">Submit</button>
    </form>

    <div class="success" id="success">
      Thank you.<br>We'll be in touch.
    </div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = {};
      new FormData(form).forEach((val, key) => data[key] = val);
      data.consent = document.getElementById('consent').checked ? 'Yes' : 'No';
      data.privacy = document.getElementById('privacy').checked ? 'Yes' : 'No';
      data.marketing = document.getElementById('marketing').checked ? 'Yes' : 'No';

      try {
        await fetch('https://script.google.com/macros/s/AKfycbyyxmeRXhsJAvJ0l0J51TbdDRAkJ3CrDvkwxj0-iRWl17u0oyFJYGLzcb8nyg1SmYY2/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        form.style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch(err) {
        alert('Something went wrong. Please try again.');
      }
    });
  </script>

</body>
</html>
